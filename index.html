<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>루틴머니 - 용돈장부 간단형</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f8fb;--surface:#fff;--surface2:#f1f3f8;--border:#e6e9f2;
  --text:#171827;--text2:#777b91;--text3:#b5bacd;
  --accent:#6259f6;--accent2:#eeeafe;--earn:#14b86e;--spend:#ef4444;--warn:#f59e0b;
  --shadow:0 6px 20px rgba(15,22,45,.06);--shadow2:0 12px 40px rgba(15,22,45,.16)
}
[data-theme="dark"]{--bg:#0f1017;--surface:#191b25;--surface2:#232634;--border:#303447;--text:#f3f4fb;--text2:#9aa0b8;--text3:#5f657e;--accent2:#28264c;--shadow:0 6px 20px rgba(0,0,0,.25);--shadow2:0 12px 40px rgba(0,0,0,.45)}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}
.app{width:100%;max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;padding-bottom:86px}
@media(min-width:768px){body{background:var(--surface2);display:flex;justify-content:center}.app{width:430px;border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 45px rgba(0,0,0,.08)}}
.header{padding:18px 18px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}.title{font-size:24px;font-weight:900;letter-spacing:-.5px}.sub{font-size:12px;color:var(--text2);margin-top:3px}.pillbtn{border:0;background:var(--surface);color:var(--text);border-radius:999px;padding:9px 12px;font-weight:800;box-shadow:var(--shadow);cursor:pointer}
.page{display:none}.page.active{display:block}.section{padding:0 14px 14px}.sec-title{font-size:12px;font-weight:900;color:var(--text2);margin:8px 4px 8px;display:flex;justify-content:space-between;align-items:center}.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.pad{padding:16px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:var(--shadow)}.sum-label{font-size:11px;color:var(--text2);font-weight:800;margin-bottom:8px}.sum-value{font-size:21px;font-weight:950;letter-spacing:-.4px}.green{color:var(--earn)}.red{color:var(--spend)}.purple{color:var(--accent)}.orange{color:var(--warn)}
.hero{margin:0 14px 14px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:26px;padding:18px;color:white;box-shadow:0 10px 30px rgba(98,89,246,.28)}.hero-top{display:flex;align-items:center;justify-content:space-between}.hero-kicker{font-size:12px;opacity:.78;font-weight:800}.hero-money{font-size:38px;font-weight:950;letter-spacing:-1px;margin-top:8px}.hero-desc{font-size:13px;opacity:.85;margin-top:8px;line-height:1.5}.hero-mini{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}.hero-mini div{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:10px}.hero-mini span{display:block;font-size:10px;opacity:.75;margin-bottom:4px}.hero-mini b{font-size:14px}
.task{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--border)}.task:last-child{border-bottom:0}.check{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;cursor:pointer}.check.done{background:var(--earn);border-color:var(--earn);color:white}.task-main{flex:1;min-width:0}.task-name{font-size:15px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.task-sub{font-size:11px;color:var(--text2);margin-top:3px}.reward{font-size:13px;font-weight:900;color:var(--earn);background:rgba(20,184,110,.1);padding:6px 9px;border-radius:999px;white-space:nowrap}.task.done .task-name{text-decoration:line-through;color:var(--text2)}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{border:0;border-radius:16px;padding:13px 14px;font-size:14px;font-weight:900;cursor:pointer}.btn.primary{background:var(--accent);color:white}.btn.ghost{background:var(--surface2);color:var(--text)}.btn.danger{background:var(--spend);color:#fff}.btn.full{width:100%}.btn.small{padding:9px 11px;border-radius:12px;font-size:12px}.btn:active{transform:scale(.98)}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}[data-theme="dark"] .nav{background:rgba(25,27,37,.88)}.nav button{flex:1;border:0;background:transparent;color:var(--text3);padding:9px 0 8px;font-size:10px;font-weight:850;cursor:pointer}.nav button.active{color:var(--accent)}.nav i{display:block;font-style:normal;font-size:22px;margin-bottom:2px}
.cal-card{background:var(--surface);border-radius:22px;margin:0 14px 14px;padding:14px;border:1px solid var(--border);box-shadow:var(--shadow)}.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.cal-head button{width:34px;height:34px;border-radius:50%;border:0;background:var(--surface2);color:var(--text);font-size:20px}.cal-title{font-weight:950}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.dow{text-align:center;font-size:10px;font-weight:900;color:var(--text2);padding:6px 0}.dow.sun{color:var(--spend)}.dow.sat{color:var(--accent)}.day{min-height:54px;border-radius:14px;background:var(--surface2);padding:5px;position:relative;cursor:pointer;border:1px solid transparent}.day.empty{background:transparent;cursor:default}.day.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}.day.selected{background:var(--accent2);border-color:var(--accent)}.dn{font-size:12px;font-weight:900}.minirow{font-size:8.5px;line-height:1.15;margin-top:4px}.minirow .e{color:var(--earn);font-weight:900}.minirow .s{color:var(--spend);font-weight:900}.dotbar{position:absolute;bottom:5px;left:6px;right:6px;display:flex;gap:3px}.dot{width:5px;height:5px;border-radius:50%}
.detail{margin:0 14px 14px}.detail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.detail-title{font-size:17px;font-weight:950}.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}.tiny{background:var(--surface2);border-radius:14px;padding:10px}.tiny span{font-size:10px;color:var(--text2);font-weight:800}.tiny b{display:block;font-size:14px;margin-top:4px}.list-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--border)}.list-row:first-child{border-top:0}.list-main{flex:1}.list-name{font-size:14px;font-weight:850}.list-sub{font-size:11px;color:var(--text2);margin-top:2px}.amount{font-weight:950}.empty{padding:28px 14px;text-align:center;color:var(--text2);font-size:13px;line-height:1.7}
.expense-row{display:flex;align-items:center;padding:14px;border-bottom:1px solid var(--border);cursor:pointer}.expense-row:last-child{border-bottom:0}.expense-main{flex:1}.expense-memo{font-size:14px;font-weight:850}.expense-date{font-size:11px;color:var(--text2);margin-top:3px}.expense-amt{font-size:15px;color:var(--spend);font-weight:950}.settings-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer}.settings-row:last-child{border-bottom:0}.color{width:16px;height:16px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);flex-shrink:0}.row-main{flex:1;min-width:0}.row-title{font-weight:850;font-size:14px}.row-sub{font-size:11px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.arrow{color:var(--text3);font-size:18px}.routine-actions{display:flex;flex-direction:column;gap:5px;margin-left:2px}.move-btn{width:28px;height:24px;border:0;border-radius:9px;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:950;cursor:pointer}.move-btn:disabled{opacity:.28;cursor:default}.budget-preview{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:12px;margin:12px 0}.budget-line{display:flex;justify-content:space-between;gap:12px;font-size:12px;margin:6px 0;color:var(--text2);font-weight:800}.budget-line b{color:var(--text);font-size:13px}.budget-line.warn b,.budget-line.warn span{color:var(--spend)}.budget-ok{margin-top:8px;font-size:12px;font-weight:950;color:var(--earn)}.budget-bad{margin-top:8px;font-size:12px;font-weight:950;color:var(--spend)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}.overlay.open{display:flex}.sheet{width:100%;max-width:430px;background:var(--surface);border-radius:26px 26px 0 0;padding:10px 18px 34px;max-height:88dvh;overflow:auto}.handle{width:42px;height:5px;border-radius:99px;background:var(--border);margin:8px auto 18px}.sheet-title{font-size:20px;font-weight:950;margin-bottom:16px}.label{font-size:11px;font-weight:950;color:var(--text2);margin:12px 0 7px;text-transform:uppercase;letter-spacing:.4px}.input{width:100%;border:1.5px solid transparent;background:var(--surface2);color:var(--text);border-radius:15px;padding:13px 14px;font-size:15px;outline:none}.input:focus{border-color:var(--accent)}.input.big{font-size:24px;font-weight:950}.days{display:flex;gap:6px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:900;cursor:pointer}.chip.on{background:var(--accent);color:white}.color-row{display:flex;align-items:center;gap:10px;padding:13px 0;cursor:pointer}.color-row .fill{flex:1;font-size:14px;font-weight:850}.color-ball{width:30px;height:30px;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.18)}.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}.sw{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;cursor:pointer}.sw.sel{border-color:var(--text);transform:scale(1.12)}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:999px;font-size:13px;font-weight:850;opacity:0;transition:.22s;z-index:200;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow2);padding:8px;z-index:150;display:none;min-width:150px}.ctx.open{display:block}.ctx button{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--text);padding:11px 12px;border-radius:10px;font-size:14px;font-weight:850}.ctx button:active{background:var(--surface2)}.ctx button.del{color:var(--spend)}
</style>
</head>
<body>
<div class="app">
  <div class="page active" id="page-home">
    <div class="header"><div><div class="title">루틴머니</div><div class="sub">해야 할 일 하면 용돈 받기</div></div><button class="pillbtn" onclick="toggleTheme()" id="themeBtn">🌙</button></div>
    <div class="hero">
      <div class="hero-top"><div><div class="hero-kicker">남은 이번달 용돈</div><div class="hero-money" id="heroBalance">0원</div></div><div style="font-size:34px">🪙</div></div>
      <div class="hero-desc">루틴을 체크하면 이번달 용돈이 쌓이고, 지출을 기록하면 빠져요. 실제로 번 용돈 안에서만 쓰는 구조.</div>
      <div class="hero-mini"><div><span>오늘 번 돈</span><b id="heroEarn">0원</b></div><div><span>오늘 쓴 돈</span><b id="heroSpend">0원</b></div><div><span>오늘 남은 돈</span><b id="heroTodayNet">0원</b></div></div>
    </div>
    <div class="section"><div class="quick"><button class="btn primary" onclick="openTaskModal(null,true)">오늘 할 일 추가</button><button class="btn ghost" onclick="openExpenseModal()">지출 기록</button></div></div>
    <div class="section"><div class="sec-title"><span>오늘 할 일</span><button class="btn small ghost" onclick="openRoutineModal()">반복 루틴 +</button></div><div class="card" id="todayTasks"></div></div>
    <div class="section"><div class="sec-title">이번달 요약</div><div class="summary" id="monthSummary"></div></div>
    <div class="detail" id="homeDetail"></div>
  </div>

  <div class="page" id="page-calendar">
    <div class="header"><div><div class="title">달력</div><div class="sub">날짜별로 번 돈·쓴 돈 확인</div></div></div>
    <div class="cal-card"><div class="cal-head"><button onclick="changeMonth(-1)">‹</button><div class="cal-title" id="calTitle"></div><button onclick="changeMonth(1)">›</button></div><div class="grid" id="calendarGrid"></div></div>
    <div class="detail" id="dateDetail"></div>
  </div>

  <div class="page" id="page-expense">
    <div class="header"><div><div class="title">지출</div><div class="sub">쓴 돈만 간단히 기록</div></div><button class="pillbtn" onclick="openExpenseModal()">+ 기록</button></div>
    <div class="section"><div class="summary" id="expenseSummary"></div></div>
    <div class="section"><div class="sec-title">이번달 지출 내역</div><div class="card" id="expenseList"></div></div>
  </div>

  <div class="page" id="page-settings">
    <div class="header"><div><div class="title">설정</div><div class="sub">반복 루틴과 루틴 예산 관리</div></div></div>
    <div class="section"><div class="sec-title">루틴 예산 설정</div><div class="card">
      <div class="settings-row" onclick="openCarryModal()"><div class="row-main"><div class="row-title">이번달 루틴 보상 예산</div><div class="row-sub" id="carrySub">0원</div></div><div class="arrow">›</div></div>
      <div class="settings-row" onclick="importPrevBalance()"><div class="row-main"><div class="row-title">전월 남은 용돈을 예산으로 불러오기</div><div class="row-sub">지난달 남은 용돈을 이번달 루틴 예산으로 설정</div></div><div class="arrow">›</div></div>
    </div></div>
    <div class="section"><div class="sec-title"><span>반복 루틴</span><button class="btn small primary" onclick="openRoutineModal()">+ 추가</button></div><div class="card" id="routineList"></div></div>
    <div class="section"><button class="btn danger full" onclick="resetConfirm()">전체 데이터 초기화</button></div>
  </div>

  <nav class="nav">
    <button class="active" onclick="showPage('home',this)"><i>🏠</i>홈</button>
    <button onclick="showPage('calendar',this)"><i>📅</i>달력</button>
    <button onclick="showPage('expense',this)"><i>💸</i>지출</button>
    <button onclick="showPage('settings',this)"><i>⚙️</i>설정</button>
  </nav>
</div>

<div class="overlay" id="overlay"><div class="sheet"><div class="handle"></div><div id="sheetContent"></div></div></div>
<div class="ctx" id="ctx"></div>
<div class="toast" id="toast"></div>

<script>
const COLORS=['#6259f6','#8b5cf6','#14b86e','#22c55e','#3b82f6','#06b6d4','#f59e0b','#ef4444','#ec4899','#64748b','#111827','#a16207','#84cc16','#fb7185','#38bdf8','#a78bfa'];
const DOW=['일','월','화','수','목','금','토'];
let today=new Date();let viewY=today.getFullYear(),viewM=today.getMonth();let selectedDate=new Date(today);let theme=localStorage.getItem('rm_theme')||'light';
let state=load();let editColor=COLORS[0];let editDays=[0,1,2,3,4,5,6];let ctxTarget=null;let lpTimer=null;
function load(){let raw=localStorage.getItem('rm_simple_v1');if(raw){try{return JSON.parse(raw)}catch(e){}}
  return {routines:[
    {id:id(),name:'기상',reward:1000,color:'#f59e0b',days:[0,1,2,3,4,5,6]},
    {id:id(),name:'샤워',reward:3000,color:'#3b82f6',days:[0,1,2,3,4,5,6]},
    {id:id(),name:'방 정리',reward:2000,color:'#14b86e',days:[0,1,2,3,4,5,6]},
    {id:id(),name:'내일 준비',reward:2000,color:'#8b5cf6',days:[0,1,2,3,4,5,6]}
  ],dayTasks:{},checks:{},expenses:{},carry:{}}}
function save(){localStorage.setItem('rm_simple_v1',JSON.stringify(state))}
function id(){return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function pad(n){return String(n).padStart(2,'0')}function dk(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function mk(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}`}function money(n){return (n<0?'-':'')+Math.abs(Math.round(n)).toLocaleString('ko-KR')+'원'}
function applyTheme(){document.documentElement.setAttribute('data-theme',theme==='dark'?'dark':'light');document.getElementById('themeBtn').textContent=theme==='dark'?'☀️':'🌙'}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('rm_theme',theme);applyTheme()}
function tasksForDate(d){const key=dk(d);const dow=d.getDay();const reps=state.routines.filter(r=>(r.days||[]).includes(dow)).map(r=>({...r,key:'r_'+r.id,type:'routine'}));const one=(state.dayTasks[key]||[]).map(t=>({...t,key:'t_'+t.id,type:'today'}));return [...reps,...one]}
function checkedMap(key){return state.checks[key]||{}}function isChecked(dateKey,taskKey){return !!checkedMap(dateKey)[taskKey]}
function toggleCheck(dateKey,task){const cm=checkedMap(dateKey);if(cm[task.key]){delete cm[task.key];showToast('적립 취소')}else{cm[task.key]={name:task.name,reward:+task.reward||0,color:task.color||COLORS[0],time:Date.now()};showToast('+'+money(task.reward)+' 적립!')}state.checks[dateKey]=cm;save();renderAll()}
function dayEarned(d){const cm=checkedMap(dk(d));return Object.values(cm).reduce((s,x)=>s+(+x.reward||0),0)}
function daySpent(d){const arr=state.expenses[mk(d)]||[];const key=dk(d);return arr.filter(e=>e.dateKey===key).reduce((s,e)=>s+(+e.amount||0),0)}
function monthEarned(y,m){const prefix=`${y}-${pad(m+1)}-`;let t=0;Object.keys(state.checks).forEach(k=>{if(k.startsWith(prefix))t+=Object.values(state.checks[k]).reduce((s,x)=>s+(+x.reward||0),0)});return t}
function monthSpent(y,m){const arr=state.expenses[`${y}-${pad(m+1)}`]||[];return arr.reduce((s,e)=>s+(+e.amount||0),0)}
function routineBudgetFor(y,m){return +(state.carry[`${y}-${pad(m+1)}`]||0)}
function carryFor(y,m){return routineBudgetFor(y,m)}
function monthBalance(y,m){return monthEarned(y,m)-monthSpent(y,m)}
function countDaysInMonth(y,m,days){const last=new Date(y,m+1,0).getDate();let c=0;for(let d=1;d<=last;d++){if((days||[]).includes(new Date(y,m,d).getDay()))c++}return c}
function routineExpectedAmount(r,y,m){return (+r.reward||0)*countDaysInMonth(y,m,r.days||[])}
function allocatedRoutineBudget(y,m,excludeId=''){return state.routines.filter(r=>r.id!==excludeId).reduce((s,r)=>s+routineExpectedAmount(r,y,m),0)}
function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll()}
function renderAll(){renderHome();renderCalendar();renderExpense();renderSettings();}
function renderHome(){const y=today.getFullYear(),m=today.getMonth();const de=dayEarned(today),ds=daySpent(today),bal=monthBalance(y,m),me=monthEarned(y,m),ms=monthSpent(y,m);
  heroBalance.textContent=money(bal);heroBalance.style.color='white';heroEarn.textContent=money(de);heroSpend.textContent=money(ds);heroTodayNet.textContent=money(de-ds);
  const tasks=tasksForDate(today);todayTasks.innerHTML=tasks.length?tasks.map(t=>taskHtml(t,dk(today))).join(''):'<div class="empty">오늘 할 일이 없어요.<br>오늘 할 일 추가나 반복 루틴을 만들어보세요.</div>';
  monthSummary.innerHTML=`<div class="sum-card"><div class="sum-label">이번달 번 용돈</div><div class="sum-value green">${money(me)}</div></div><div class="sum-card"><div class="sum-label">이번달 지출</div><div class="sum-value red">${money(ms)}</div></div><div class="sum-card"><div class="sum-label">남은 이번달 용돈</div><div class="sum-value ${bal>=0?'green':'red'}">${money(bal)}</div></div>`;
  homeDetail.innerHTML=homeRecordHtml(today);
}
function taskHtml(t,dateKey){const done=isChecked(dateKey,t.key);return `<div class="task ${done?'done':''}" onpointerdown="longPress(event,'task','${dateKey}','${t.key}')" onpointerup="clearLP()" onpointerleave="clearLP()"><div class="check ${done?'done':''}" onclick='toggleCheck("${dateKey}",${JSON.stringify(t).replace(/'/g,"&#39;")})'>${done?'✓':''}</div><div class="task-main"><div class="task-name">${escapeHtml(t.name)}</div><div class="task-sub">${t.type==='today'?'오늘만':'반복'} · ${DOW[new Date(dateKey).getDay()]}요일</div></div><div class="reward">+${money(t.reward)}</div></div>`}
function homeRecordHtml(d){const key=dk(d),de=dayEarned(d),ds=daySpent(d),exps=(state.expenses[mk(d)]||[]).filter(e=>e.dateKey===key);return `<div class="card pad"><div class="detail-head"><div class="detail-title">오늘 기록</div><button class="btn small ghost" onclick="openExpenseModal('${key}')">지출 +</button></div><div class="detail-grid"><div class="tiny"><span>번 돈</span><b class="green">${money(de)}</b></div><div class="tiny"><span>쓴 돈</span><b class="red">${money(ds)}</b></div><div class="tiny"><span>오늘 잔액</span><b class="${de-ds>=0?'green':'red'}">${money(de-ds)}</b></div></div><div class="sec-title" style="margin-left:0;margin-top:4px">오늘 지출</div>${exps.length?exps.map(e=>`<div class="list-row"><div class="list-main"><div class="list-name">${escapeHtml(e.memo||'지출')}</div><div class="list-sub">${e.dateKey}</div></div><div class="amount red">-${money(e.amount)}</div></div>`).join(''):'<div class="empty" style="padding:14px">오늘 지출 없음</div>'}<button class="btn ghost full" style="margin-top:10px" onclick="openExpenseModal('${key}')">오늘 지출 기록</button></div>`}

function detailHtml(d,showTitle=true){const key=dk(d),de=dayEarned(d),ds=daySpent(d),cm=checkedMap(key),exps=(state.expenses[mk(d)]||[]).filter(e=>e.dateKey===key);const tasks=tasksForDate(d);let doneNames=Object.values(cm);return `<div class="card pad">${showTitle?`<div class="detail-head"><div class="detail-title">${d.getMonth()+1}월 ${d.getDate()}일 ${DOW[d.getDay()]}요일</div><button class="btn small ghost" onclick="openTaskModal('${key}',true)">할 일 +</button></div>`:''}<div class="detail-grid"><div class="tiny"><span>번 돈</span><b class="green">${money(de)}</b></div><div class="tiny"><span>쓴 돈</span><b class="red">${money(ds)}</b></div><div class="tiny"><span>하루 잔액</span><b class="${de-ds>=0?'green':'red'}">${money(de-ds)}</b></div></div><div class="sec-title" style="margin-left:0">할 일</div>${tasks.length?tasks.map(t=>taskHtml(t,key)).join(''):'<div class="empty">이 날짜에 할 일이 없어요.</div>'}<div class="sec-title" style="margin-left:0;margin-top:12px">지출</div>${exps.length?exps.map(e=>`<div class="list-row"><div class="list-main"><div class="list-name">${escapeHtml(e.memo||'지출')}</div><div class="list-sub">${e.dateKey}</div></div><div class="amount red">-${money(e.amount)}</div></div>`).join(''):'<div class="empty" style="padding:14px">지출 없음</div>'}<button class="btn ghost full" style="margin-top:10px" onclick="openExpenseModal('${key}')">이 날짜에 지출 추가</button></div>`}
function renderCalendar(){calTitle.textContent=`${viewY}년 ${viewM+1}월`;calendarGrid.innerHTML='';DOW.forEach((d,i)=>{calendarGrid.insertAdjacentHTML('beforeend',`<div class="dow ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`)});const first=new Date(viewY,viewM,1).getDay(),last=new Date(viewY,viewM+1,0).getDate();for(let i=0;i<first;i++)calendarGrid.insertAdjacentHTML('beforeend','<div class="day empty"></div>');for(let day=1;day<=last;day++){const d=new Date(viewY,viewM,day);const e=dayEarned(d),s=daySpent(d),net=e-s;const isT=dk(d)===dk(today),sel=dk(d)===dk(selectedDate);let dots='';if(e>0)dots+=`<span class="dot" style="background:var(--earn)"></span>`;if(s>0)dots+=`<span class="dot" style="background:var(--spend)"></span>`;if(tasksForDate(d).length)dots+=`<span class="dot" style="background:var(--accent)"></span>`;calendarGrid.insertAdjacentHTML('beforeend',`<div class="day ${isT?'today':''} ${sel?'selected':''}" onclick="selectDate(${viewY},${viewM},${day})"><div class="dn">${day}</div><div class="minirow">${e?`<div class="e">+${shortMoney(e)}</div>`:''}${s?`<div class="s">-${shortMoney(s)}</div>`:''}</div><div class="dotbar">${dots}</div></div>`)}dateDetail.innerHTML=detailHtml(selectedDate,true)}
function shortMoney(n){if(n>=10000)return Math.round(n/1000)/10+'만';return Math.round(n/1000)+'천'}
function selectDate(y,m,d){selectedDate=new Date(y,m,d);renderCalendar()}
function changeMonth(dir){viewM+=dir;if(viewM<0){viewM=11;viewY--}if(viewM>11){viewM=0;viewY++}selectedDate=new Date(viewY,viewM,1);renderCalendar()}
function renderExpense(){const y=today.getFullYear(),m=today.getMonth(),me=monthEarned(y,m),ms=monthSpent(y,m),bal=monthBalance(y,m);expenseSummary.innerHTML=`<div class="sum-card"><div class="sum-label">이번달 적립</div><div class="sum-value green">${money(me)}</div></div><div class="sum-card"><div class="sum-label">이번달 지출</div><div class="sum-value red">${money(ms)}</div></div><div class="sum-card"><div class="sum-label">남은 용돈</div><div class="sum-value ${bal>=0?'green':'red'}">${money(bal)}</div></div><div class="sum-card"><div class="sum-label">오늘 지출</div><div class="sum-value red">${money(daySpent(today))}</div></div>`;const arr=[...(state.expenses[mk(today)]||[])].sort((a,b)=>b.dateKey.localeCompare(a.dateKey)||b.id.localeCompare(a.id));expenseList.innerHTML=arr.length?arr.map(e=>`<div class="expense-row" onpointerdown="longPress(event,'expense','${mk(today)}','${e.id}')" onpointerup="clearLP()" onpointerleave="clearLP()"><div class="expense-main"><div class="expense-memo">${escapeHtml(e.memo||'지출')}</div><div class="expense-date">${e.dateKey}</div></div><div class="expense-amt">-${money(e.amount)}</div></div>`).join(''):'<div class="empty">이번달 지출 내역이 없어요.</div>'}
function renderSettings(){const y=today.getFullYear(),m=today.getMonth();carrySub.textContent=money(routineBudgetFor(y,m));routineList.innerHTML=state.routines.length?state.routines.map((r,i)=>`<div class="settings-row" onclick="openRoutineModal('${r.id}')"><div class="color" style="background:${r.color}"></div><div class="row-main"><div class="row-title">${escapeHtml(r.name)} · +${money(r.reward)}</div><div class="row-sub">${(r.days||[]).map(x=>DOW[x]).join(' ')} · 이번달 예상 ${money(routineExpectedAmount(r,y,m))}</div></div><div class="routine-actions"><button class="move-btn" ${i===0?'disabled':''} onclick="event.stopPropagation();moveRoutine(${i},-1)">▲</button><button class="move-btn" ${i===state.routines.length-1?'disabled':''} onclick="event.stopPropagation();moveRoutine(${i},1)">▼</button></div><div class="arrow">›</div></div>`).join(''):'<div class="empty">반복 루틴 없음</div>'}
function openSheet(html){sheetContent.innerHTML=html;overlay.classList.add('open')}function closeSheet(){overlay.classList.remove('open')}overlay.addEventListener('click',e=>{if(e.target.id==='overlay')closeSheet()})
function moveRoutine(idx,dir){const ni=idx+dir;if(ni<0||ni>=state.routines.length)return;const tmp=state.routines[idx];state.routines[idx]=state.routines[ni];state.routines[ni]=tmp;save();renderAll();showToast('순서 변경됨')}
function openRoutineModal(rid){
  const r=state.routines.find(x=>x.id===rid)||{id:null,name:'',reward:1000,color:COLORS[0],days:[0,1,2,3,4,5,6]};
  editColor=r.color;editDays=[...(r.days||[])];
  const ridSafe=rid||'';
  openSheet(`<div class="sheet-title">${rid?'반복 루틴 수정':'반복 루틴 추가'}</div>
    <div class="label">루틴 이름</div><input class="input" id="rName" value="${escapeAttr(r.name)}" placeholder="예: 샤워, 방 정리">
    <div class="label">보상금</div><input class="input big" id="rReward" type="number" inputmode="numeric" value="${r.reward||0}" oninput="updateRoutineBudgetPreview('${ridSafe}')">
    <div class="label">반복 요일</div><div class="days" id="dayChips">${DOW.map((d,i)=>`<span class="chip ${editDays.includes(i)?'on':''}" onclick="toggleDay(${i},this);updateRoutineBudgetPreview('${ridSafe}')">${d}</span>`).join('')}</div>
    <div id="budgetPreview" class="budget-preview"></div>
    <div class="label">색상</div><div class="color-row" onclick="openColorPicker()"><div class="fill">색상</div><div class="color-ball" id="colorPreview" style="background:${editColor}"></div><div class="arrow">›</div></div>
    <button class="btn primary full" onclick="saveRoutine('${ridSafe}')">저장</button>${rid?'<button class="btn danger full" style="margin-top:8px" onclick="deleteRoutine(\''+rid+'\')">삭제</button>':''}<button class="btn ghost full" style="margin-top:8px" onclick="closeSheet()">취소</button>`);
  updateRoutineBudgetPreview(ridSafe);
}
function toggleDay(i,el){if(editDays.includes(i))editDays=editDays.filter(x=>x!==i);else editDays.push(i);editDays.sort((a,b)=>a-b);el.classList.toggle('on')}
function updateRoutineBudgetPreview(rid=''){
  const el=document.getElementById('budgetPreview');if(!el)return;
  const y=today.getFullYear(),m=today.getMonth();
  const budget=routineBudgetFor(y,m);
  const allocated=allocatedRoutineBudget(y,m,rid);
  const reward=+(document.getElementById('rReward')?.value||0);
  const count=countDaysInMonth(y,m,editDays);
  const expected=reward*count;
  const remain=budget-allocated-expected;
  const noBudget=budget<=0;
  el.innerHTML=`<div class="budget-line"><span>이번달 루틴 예산</span><b>${money(budget)}</b></div>
  <div class="budget-line"><span>이미 배정됨</span><b>${money(allocated)}</b></div>
  <div class="budget-line"><span>이 루틴 예상</span><b>${money(expected)} <small>(${count}회)</small></b></div>
  <div class="budget-line ${remain<0?'warn':''}"><span>저장 후 남음</span><b>${money(remain)}</b></div>
  <div class="${noBudget?'budget-bad':remain<0?'budget-bad':'budget-ok'}">${noBudget?'설정에서 이번달 루틴 예산을 먼저 입력하세요.':remain<0?'예산 초과입니다. 보상금이나 요일을 줄이는 게 맞습니다.':'예산 안에 들어옵니다.'}</div>`;
}
function saveRoutine(rid){const name=rName.value.trim();const reward=+rReward.value||0;if(!name){showToast('이름을 입력해주세요');return}if(!editDays.length){showToast('요일을 하나 이상 선택해주세요');return}const y=today.getFullYear(),m=today.getMonth(),budget=routineBudgetFor(y,m),allocated=allocatedRoutineBudget(y,m,rid),expected=reward*countDaysInMonth(y,m,editDays);if(budget>0&&allocated+expected>budget&&!confirm(`이번달 루틴 예산을 ${money(allocated+expected-budget)} 초과합니다. 그래도 저장할까요?`))return;if(rid){const r=state.routines.find(x=>x.id===rid);Object.assign(r,{name,reward,color:editColor,days:editDays})}else state.routines.push({id:id(),name,reward,color:editColor,days:editDays});save();closeSheet();renderAll();showToast('저장됐어요')}
function deleteRoutine(rid){if(!confirm('이 반복 루틴을 삭제할까요? 과거 적립 기록은 유지돼요.'))return;state.routines=state.routines.filter(r=>r.id!==rid);save();closeSheet();renderAll();showToast('삭제됐어요')}
function openTaskModal(dateKey=dk(today),todayOnly=true){if(!dateKey)dateKey=dk(today);editColor=COLORS[1];openSheet(`<div class="sheet-title">오늘만 할 일 추가</div><div class="label">날짜</div><input class="input" id="tDate" type="date" value="${dateKey}"><div class="label">할 일 이름</div><input class="input" id="tName" placeholder="예: 병원 가기, 세차하기"><div class="label">보상금</div><input class="input big" id="tReward" type="number" inputmode="numeric" value="1000"><div class="label">색상</div><div class="color-row" onclick="openColorPicker()"><div class="fill">색상</div><div class="color-ball" id="colorPreview" style="background:${editColor}"></div><div class="arrow">›</div></div><button class="btn primary full" onclick="saveTodayTask()">추가</button><button class="btn ghost full" style="margin-top:8px" onclick="closeSheet()">취소</button>`)}
function saveTodayTask(){const date=tDate.value,name=tName.value.trim(),reward=+tReward.value||0;if(!name){showToast('이름을 입력해주세요');return}state.dayTasks[date]=state.dayTasks[date]||[];state.dayTasks[date].push({id:id(),name,reward,color:editColor});save();closeSheet();renderAll();showToast('오늘 할 일 추가')}
function openExpenseModal(dateKey=dk(today)){openSheet(`<div class="sheet-title">지출 기록</div><div class="label">날짜</div><input class="input" id="eDate" type="date" value="${dateKey}"><div class="label">금액</div><input class="input big" id="eAmount" type="number" inputmode="numeric" placeholder="0"><div class="label">메모</div><input class="input" id="eMemo" placeholder="예: 편의점, 배달, 모임"><button class="btn primary full" onclick="saveExpense()">기록하기</button><button class="btn ghost full" style="margin-top:8px" onclick="closeSheet()">취소</button>`)}
function saveExpense(){const date=eDate.value,amount=+eAmount.value||0,memo=eMemo.value.trim()||'지출';if(amount<=0){showToast('금액을 입력해주세요');return}const mkey=date.slice(0,7);state.expenses[mkey]=state.expenses[mkey]||[];state.expenses[mkey].push({id:id(),dateKey:date,amount,memo});save();closeSheet();renderAll();showToast(money(amount)+' 기록됨')}
function openCarryModal(){const key=mk(today),cur=state.carry[key]||0;openSheet(`<div class="sheet-title">이번달 루틴 보상 예산</div><div class="label">루틴에 배정할 총 예산</div><input class="input big" id="carryInput" type="number" inputmode="numeric" value="${cur}"><div class="empty" style="padding:12px;text-align:left">이 금액은 홈의 남은 용돈에 더해지지 않습니다. 반복 루틴을 짤 때 보상금 총액이 이 예산 안에 들어오는지 확인하는 용도입니다.</div><button class="btn primary full" onclick="saveCarry()">저장</button><button class="btn ghost full" style="margin-top:8px" onclick="closeSheet()">취소</button>`)}
function saveCarry(){state.carry[mk(today)]=+carryInput.value||0;save();closeSheet();renderAll();showToast('루틴 예산 저장')}
function importPrevBalance(){const prev=new Date(today.getFullYear(),today.getMonth()-1,1);const prevBal=monthBalance(prev.getFullYear(),prev.getMonth());if(prevBal<0){showToast('전월 잔액이 마이너스예요');return}if(confirm(`전월 남은 용돈 ${money(prevBal)}을 이번달 루틴 예산으로 설정할까요?`)){state.carry[mk(today)]=prevBal;save();renderAll();showToast('전월 잔액 반영')}}
function openColorPicker(){const old=sheetContent.innerHTML;openSheet(`<div class="sheet-title">색상 선택</div><div class="palette">${COLORS.map(c=>`<div class="sw ${c===editColor?'sel':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')}</div><button class="btn primary full" style="margin-top:16px" onclick="closeColorPicker()">선택</button>`);window._returnSheet=old}
function selectColor(c){editColor=c;document.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel'));event.target.classList.add('sel')}
function closeColorPicker(){sheetContent.innerHTML=window._returnSheet;const p=document.getElementById('colorPreview');if(p)p.style.background=editColor}
function longPress(ev,type,a,b){clearLP();lpTimer=setTimeout(()=>showContext(ev,type,a,b),600)}function clearLP(){if(lpTimer)clearTimeout(lpTimer)}
function showContext(ev,type,a,b){ev.preventDefault();ctxTarget={type,a,b};let html='';if(type==='expense'){html='<button class="del" onclick="deleteCtxExpense()">🗑️ 지출 삭제</button>'}else if(type==='task'){html='<button class="del" onclick="deleteCtxTask()">🗑️ 오늘만 할 일 삭제</button>'}ctx.innerHTML=html||'<button onclick="hideCtx()">닫기</button>';ctx.style.left=Math.min(ev.clientX,window.innerWidth-170)+'px';ctx.style.top=Math.min(ev.clientY,window.innerHeight-100)+'px';ctx.classList.add('open')}
function hideCtx(){ctx.classList.remove('open')}document.addEventListener('click',e=>{if(!ctx.contains(e.target))hideCtx()})
function deleteCtxExpense(){const {a,b}=ctxTarget;state.expenses[a]=(state.expenses[a]||[]).filter(e=>e.id!==b);save();hideCtx();renderAll();showToast('지출 삭제')}
function deleteCtxTask(){const {a,b}=ctxTarget;if(!b.startsWith('t_')){showToast('반복 루틴은 설정에서 삭제');hideCtx();return}const id2=b.slice(2);state.dayTasks[a]=(state.dayTasks[a]||[]).filter(t=>t.id!==id2);if(state.checks[a])delete state.checks[a][b];save();hideCtx();renderAll();showToast('할 일 삭제')}
function resetConfirm(){if(confirm('정말 전체 데이터를 삭제할까요?')){localStorage.removeItem('rm_simple_v1');state=load();renderAll();showToast('초기화 완료')}}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>toast.classList.remove('show'),1600)}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}
applyTheme();renderAll();
</script>
</body>
</html>
